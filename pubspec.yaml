name: weather_app
description: "Тестовое задание Wether App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # icons
  cupertino_icons: ^1.0.8
  flutter_weather_conditions: ^1.0.1

  # Navigation
  go_router: ^17.0.0

  # State manager
  flutter_riverpod: ^3.3.1

  # Network
  dio: ^5.9.2
  connectivity_plus: ^7.0.0

  # json serialization
  json_annotation: ^4.9.0

  # prefs
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.7.1


flutter:
  uses-material-design: true

  assets:
    - assets/data/cities.json

